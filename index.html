<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>知识表示与推理期末练习</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow">MOOC 期末题库</p>
        <h1>知识表示与推理期末练习</h1>
      </div>
      <div class="stats" aria-live="polite">
        <span id="totalCount">0 题</span>
        <span id="answeredCount">已答 0</span>
      </div>
    </header>

    <main class="layout">
      <aside class="panel">
        <div class="tabs" role="tablist" aria-label="题型筛选">
          <button class="tab is-active" type="button" data-filter="all">全部</button>
          <button class="tab" type="button" data-filter="single">单选</button>
          <button class="tab" type="button" data-filter="multiple">多选</button>
        </div>
        <label class="search">
          <span>搜索题目</span>
          <input id="searchInput" type="search" placeholder="输入关键词" />
        </label>
        <div class="hint">多选题可选择多个选项。提交后会显示正确答案；未确定的答案显示“不确定”。</div>
      </aside>

      <section class="content">
        <div id="loading" class="loading">正在载入题库...</div>
        <div id="questions" class="questions" aria-live="polite"></div>
      </section>
    </main>

    <template id="questionTemplate">
      <article class="question-card">
        <div class="question-head">
          <span class="badge"></span>
          <span class="number"></span>
        </div>
        <h2></h2>
        <div class="options"></div>
        <div class="actions">
          <button class="submit" type="button">提交答案</button>
          <button class="reset" type="button">重做</button>
        </div>
        <p class="result" aria-live="polite"></p>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
